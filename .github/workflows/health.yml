name: Health CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install desloppify fork
        run: pip install -e desloppify-fork

      - name: Install test dependencies
        run: pip install pytest

      - name: Run pytest
        run: pytest tests/ -v

      - name: Run CLI smoke tests
        run: bash tests/test_cli.sh

      - name: Run doctor (allow failure)
        run: ./comfy-health doctor || true
